<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowコスメプロフカードメーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&family=Yomogi&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Maru Gothic',sans-serif;background:#f9f6f2;padding:16px;max-width:480px;margin:0 auto;padding-bottom:48px}
.app-header{text-align:center;margin-bottom:20px;padding:12px 0 0}
.app-title{font-size:20px;font-weight:700;color:#2C2C2A}
.app-sub{font-size:12px;color:#888;margin-top:4px}
.picker-section{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.picker-label{font-size:11px;color:#888;font-weight:700;letter-spacing:.06em;margin-bottom:8px}
.theme-row{display:flex;gap:7px;flex-wrap:wrap}
.tbtn{border-radius:999px;padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.tbtn.fem{background:#fce8f3;color:#9d3060}
.tbtn.sim{background:#f0ede6;color:#4a4740}
.tbtn.pop{background:#e8f4ff;color:#2563a8}
.tbtn.active.fem{border-color:#D4537E}
.tbtn.active.sim{border-color:#888780}
.tbtn.active.pop{border-color:#60a5fa}
.font-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.fbtn{border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;border:2px solid #e0ddf0;background:#fafafa;color:#2C2C2A;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fbtn.active{border-color:#D4537E;background:#fff0f5;color:#D4537E}
.fbtn.f-maru{font-family:'Zen Maru Gothic',sans-serif}
.fbtn.f-mincho{font-family:'Shippori Mincho',serif}
.fbtn.f-klee{font-family:'Klee One',cursive}
.fbtn.f-yomogi{font-family:'Yomogi',cursive}
.stepbar{display:flex;gap:4px;margin-bottom:6px}
.sp{flex:1;height:4px;border-radius:2px;background:#e0ddf0;transition:background .3s}
.step-labels{display:flex;margin-bottom:16px}
.step-labels span{font-size:10px;color:#aaa;flex:1;text-align:center}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.shead{font-size:13px;font-weight:700;color:#888;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid #eee}
.shead-en{font-size:16px;font-weight:700;color:#2C2C2A;font-style:italic;font-family:'Shippori Mincho',serif}
.shead-ja{font-size:11px;color:#aaa;margin-left:4px}
.flabel{font-size:11px;color:#888;margin-bottom:4px;font-weight:600}
.fwrap{margin-bottom:12px}
input[type=text],select,textarea{width:100%;padding:10px 12px;border:1.5px solid #e8e4f0;border-radius:10px;font-size:14px;background:#fff;outline:none;-webkit-appearance:none;font-family:inherit;color:#2C2C2A}
input[type=text]:focus,select:focus,textarea:focus{border-color:#D4537E}
textarea{height:60px;resize:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.avcircle{width:68px;height:68px;border-radius:50%;border:2.5px dashed #ddd;background:#fafafa;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;position:relative}
.avcircle img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.abtn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;color:#fff;margin-top:12px;-webkit-tap-highlight-color:transparent;font-family:inherit;letter-spacing:.04em}
.sbtn{width:100%;padding:12px;border-radius:12px;font-size:14px;cursor:pointer;border:1.5px solid #e8e4f0;background:#fff;color:#444;margin-top:8px;-webkit-tap-highlight-color:transparent;font-family:inherit}
.nav2{display:flex;gap:8px;margin-top:12px}
.nav2 .sbtn{margin-top:0;flex:1}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#fafaf8;border-radius:12px;cursor:pointer;margin-bottom:8px;border:1.5px solid #eee}
.acc-en{font-size:14px;font-weight:700;font-style:italic;font-family:'Shippori Mincho',serif;color:#2C2C2A}
.acc-ja{font-size:11px;color:#aaa;margin-left:4px}
.acc-arrow{font-size:13px;transition:transform .25s;color:#ccc}
.acc-body{display:none;padding:2px 0 8px}.acc-body.open{display:block}
.cat-section{margin-bottom:10px}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:6px}
.slot{border:1.5px dashed #ddd;border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#fafafa;overflow:hidden;position:relative}
.slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.slot-wrap{position:relative}
.slot-file{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3;font-size:0}
.del-btn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ff4d6d;color:#fff;border:none;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;font-weight:700}
.slot-wrap.has-img .del-btn{display:flex}
.add-slot-btn{border:1.5px dashed #ddd;border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fafafa;font-size:22px;color:#ccc}
.nm-input{margin-top:5px;padding:7px 10px;border:1.5px solid #e8e4f0;border-radius:8px;font-size:11px;width:100%;background:#fff;outline:none;font-family:inherit}
canvas{display:none;width:100%;height:auto;border-radius:16px;border:1px solid #eee;margin-top:8px}
.page-tabs{display:flex;gap:6px;margin-bottom:10px;display:none}
.ptab{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #eee;background:#fff;color:#888;font-family:inherit;text-align:center;transition:all .2s}
.ptab.on{color:#fff;border-color:transparent}
#generating{text-align:center;padding:40px 20px;color:#888;font-size:14px;display:none}
.at-row{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.at-prefix{font-size:18px;font-weight:700;color:#aaa}
.tip-box{border-radius:12px;padding:11px 14px;margin-bottom:14px;font-size:13px;display:flex;align-items:flex-start;gap:8px;background:#fce8f3;color:#9d3060}
</style>
</head>
<body>
<div class="app-header">
  <div class="app-title">💄 Cosme Profile Maker</div>
  <div class="app-sub">by Glow — スマホ完結・3枚カード生成</div>
</div>

<div class="picker-section">
  <div class="picker-label">🎨 テーマ</div>
  <div class="theme-row" id="theme-top">
    <button class="tbtn fem active" onclick="setT('fem',this)">♡ フェミニン</button>
    <button class="tbtn sim" onclick="setT('sim',this)">◇ シンプル</button>
    <button class="tbtn pop" onclick="setT('pop',this)">★ ポップ</button>
  </div>
  <div style="height:10px"></div>
  <div class="picker-label">✏️ フォント</div>
  <div class="font-row" id="font-row">
    <button class="fbtn f-maru active" onclick="setFont('maru',this)">丸ゴシック</button>
    <button class="fbtn f-mincho" onclick="setFont('mincho',this)">明朝体</button>
    <button class="fbtn f-klee" onclick="setFont('klee',this)">クリー</button>
    <button class="fbtn f-yomogi" onclick="setFont('yomogi',this)">よもぎ</button>
  </div>
</div>

<div class="stepbar">
  <div class="sp" id="sp1"></div><div class="sp" id="sp2"></div>
  <div class="sp" id="sp3"></div><div class="sp" id="sp4"></div>
</div>
<div class="step-labels">
  <span>プロフ</span><span>スキンケア</span><span>メイク</span><span>完成</span>
</div>

<!-- PAGE 1 -->
<div class="page" id="pg1">
  <div class="card">
    <div class="shead"><span class="shead-en">Profile</span><span class="shead-ja">プロフィール</span></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div class="avcircle" style="position:relative">
        <img id="avimg"><span style="font-size:26px">📷</span>
        <input type="file" accept="image/*" onchange="loadAv(this)" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3;font-size:0">
      </div>
      <div style="flex:1"><div class="flabel">名前・ニックネーム</div><input type="text" id="pname" placeholder="例：かろりー"></div>
    </div>
    <div class="at-row">
      <span class="at-prefix">@</span>
      <input type="text" id="paccount" placeholder="アカウント名（例：glow_cosme）">
    </div>
    <div class="g2">
      <div class="fwrap"><div class="flabel">年齢</div><input type="text" id="page" placeholder="例：20代"></div>
      <div class="fwrap"><div class="flabel">肌質</div>
        <select id="pskin"><option value="">選択</option><option>乾燥肌</option><option>脂性肌</option><option>混合肌</option><option>敏感肌</option><option>敏感×混合肌</option><option>普通肌</option><option>その他</option></select>
      </div>
    </div>
    <div class="g3">
      <div class="fwrap"><div class="flabel">パーソナルカラー</div>
        <select id="ppc" onchange="toggleOther('ppc','ppc-o')"><option value="">選択</option><option>イエベ春</option><option>イエベ秋</option><option>ブルベ夏</option><option>ブルベ冬</option><option>未診断</option><option>その他</option></select>
        <input type="text" id="ppc-o" class="nm-input" placeholder="自由入力" style="display:none;margin-top:6px">
      </div>
      <div class="fwrap"><div class="flabel">骨格タイプ</div>
        <select id="pbone" onchange="toggleOther('pbone','pbone-o')"><option value="">選択</option><option>ストレート</option><option>ウェーブ</option><option>ナチュラル</option><option>未診断</option><option>その他</option></select>
        <input type="text" id="pbone-o" class="nm-input" placeholder="自由入力" style="display:none;margin-top:6px">
      </div>
      <div class="fwrap"><div class="flabel">顔タイプ</div>
        <select id="pface"><option value="">選択</option><option>フレッシュ</option><option>エレガント</option><option>フェミニン</option><option>キュート</option><option>アクティブキュート</option><option>クール</option><option>クールカジュアル</option><option>ソフエレ</option><option>未診断</option></select>
      </div>
    </div>
    <div class="fwrap"><div class="flabel">好きなブランド</div><input type="text" id="pbrands" placeholder="例：anua, VT, JILLSTUART"></div>
    <div class="g2">
      <div class="fwrap"><div class="flabel">好きな色</div><input type="text" id="pcolor" placeholder="例：ピンク・ベージュ"></div>
      <div class="fwrap"><div class="flabel">MBTI（任意）</div><input type="text" id="pmbti" placeholder="例：INFP"></div>
    </div>
    <div class="fwrap"><div class="flabel">自己紹介・コメント ♡</div><textarea id="pintro" placeholder="例：コスメオタクです♡ タメ口大歓迎！"></textarea></div>
  </div>
  <button class="abtn" id="abtn1" onclick="goP(2)">次へ → スキンケアを入力 ›</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="pg2">
  <div class="tip-box" id="photo-tip">
    <span style="font-size:18px;flex-shrink:0">📸</span>
    <div>平置きして真上から撮るのがおすすめ。1カテゴリーに最大6品追加できます。</div>
  </div>
  <div class="card">
    <div class="shead"><span class="shead-en">Skincare</span><span class="shead-ja">スキンケア</span></div>
    <div id="sc-cats"></div>
  </div>
  <div class="nav2">
    <button class="sbtn" onclick="goP(1)">‹ 戻る</button>
    <button class="abtn" id="abtn2" style="flex:2;margin-top:0" onclick="goP(3)">次へ → メイクを入力 ›</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="pg3">
  <div class="card">
    <div class="shead"><span class="shead-en">Makeup</span><span class="shead-ja">メイク</span></div>
    <div id="mk-cats"></div>
  </div>
  <div class="nav2">
    <button class="sbtn" onclick="goP(2)">‹ 戻る</button>
    <button class="abtn" id="abtn3" style="flex:2;margin-top:0" onclick="goP(4)">カードを生成 ›</button>
  </div>
</div>

<!-- PAGE 4 -->
<div class="page" id="pg4">
  <div class="picker-section" style="margin-bottom:12px">
    <div class="picker-label">🎨 テーマ変更</div>
    <div class="theme-row" id="theme-gen">
      <button class="tbtn fem" id="th2-fem" onclick="setT2('fem',this)">♡ フェミニン</button>
      <button class="tbtn sim" id="th2-sim" onclick="setT2('sim',this)">◇ シンプル</button>
      <button class="tbtn pop" id="th2-pop" onclick="setT2('pop',this)">★ ポップ</button>
    </div>
    <div style="height:10px"></div>
    <div class="picker-label">✏️ フォント変更</div>
    <div class="font-row" id="font-gen">
      <button class="fbtn f-maru" id="fg-maru" onclick="setFont2('maru',this)">丸ゴシック</button>
      <button class="fbtn f-mincho" id="fg-mincho" onclick="setFont2('mincho',this)">明朝体</button>
      <button class="fbtn f-klee" id="fg-klee" onclick="setFont2('klee',this)">クリー</button>
      <button class="fbtn f-yomogi" id="fg-yomogi" onclick="setFont2('yomogi',this)">よもぎ</button>
    </div>
  </div>
  <div id="generating">✨ カードを生成中...</div>
  <div class="page-tabs" id="ptabs">
    <button class="ptab" id="pt0" onclick="showCv(0)">① プロフ</button>
    <button class="ptab" id="pt1" onclick="showCv(1)">② スキンケア</button>
    <button class="ptab" id="pt2" onclick="showCv(2)">③ メイク</button>
  </div>
  <canvas id="cv0"></canvas>
  <canvas id="cv1"></canvas>
  <canvas id="cv2"></canvas>
  <button class="sbtn" id="dlbtn" style="display:none" onclick="dlCard()">⬇️ 表示中の画像を保存</button>
  <button class="sbtn" id="dlall" style="display:none" onclick="dlAll()">⬇️ 3枚まとめて保存</button>
  <button class="sbtn" onclick="goP(3)">✏️ 編集に戻る</button>
</div>

<script>
const TH={
  fem:{g1:'#f9c5d1',g2:'#c9b8f5',g3:'#f7e8f9',ac:'#D4537E',ac2:'#a78bfa',card:'rgba(255,255,255,0.9)',cb:'rgba(212,83,126,0.2)',hc:'#b5179e',lc:'#c06080',vc:'#2C2C2A',ft:'rgba(252,220,235,0.96)',fc:'#9d3060',dc:['#f472b6','#e879f9','#fb7185','#fbbf24','#a78bfa']},
  sim:{g1:'#e8e4db',g2:'#d4cfc6',g3:'#f5f3ee',ac:'#888780',ac2:'#b5b0a8',card:'rgba(255,255,255,0.92)',cb:'rgba(136,135,128,0.18)',hc:'#444441',lc:'#888780',vc:'#2C2C2A',ft:'rgba(240,237,230,0.96)',fc:'#444441',dc:['#c8c4bc','#b5b0a8','#d4cfc6','#a8a4a0','#bcb8b2']},
  pop:{g1:'#bfdbfe',g2:'#93c5fd',g3:'#dbeafe',ac:'#2563a8',ac2:'#60a5fa',card:'rgba(255,255,255,0.92)',cb:'rgba(96,165,250,0.22)',hc:'#1d4ed8',lc:'#3b6cb0',vc:'#1e293b',ft:'rgba(219,234,254,0.96)',fc:'#1d4ed8',dc:['#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa']}
};
const FONTS={
  maru:"'Zen Maru Gothic',sans-serif",
  mincho:"'Shippori Mincho',serif",
  klee:"'Klee One',cursive",
  yomogi:"'Yomogi',cursive"
};
const SC_CATS=[{key:'cl',en:'cleansing',ja:'クレンジング・洗顔'},{key:'to',en:'toner',ja:'化粧水'},{key:'em',en:'emulsion',ja:'乳液'},{key:'se',en:'serum',ja:'美容液・クリーム'}];
const MK_CATS=[{key:'ba',en:'base make',ja:'ベースメイク'},{key:'ey',en:'eye make',ja:'アイメイク'},{key:'li',en:'lip',ja:'リップ'},{key:'ch',en:'cheek',ja:'チーク・ハイライト'}];

let cur='fem',curFont='maru',avDataUrl=null,currentCv=0;
const slotData={};

function FF(){return FONTS[curFont];}
function C(){return TH[cur];}

// ====== スロットUI ======
function initCats(cats,cid){
  const cont=document.getElementById(cid);cont.innerHTML='';
  cats.forEach(cat=>{
    const sec=document.createElement('div');sec.className='cat-section';
    sec.innerHTML=`<div class="acc-head" onclick="toggleAcc('${cat.key}')"><div><span class="acc-en">${cat.en}</span><span class="acc-ja">${cat.ja}</span></div><span class="acc-arrow" id="arr-${cat.key}">▼</span></div><div class="acc-body open" id="body-${cat.key}"><div class="slots-grid" id="grid-${cat.key}"></div></div>`;
    cont.appendChild(sec);renderSlots(cat.key,1);
  });
}
function toggleAcc(k){const b=document.getElementById('body-'+k),a=document.getElementById('arr-'+k);b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'rotate(180deg)':'';}
function renderSlots(key,min){
  const grid=document.getElementById('grid-'+key);grid.innerHTML='';
  let filled=0;for(let i=0;i<6;i++)if(slotData[key+'_'+i])filled=i+1;
  const show=Math.min(Math.max(min,filled+1,1),6);
  for(let i=0;i<show;i++){
    const k=key+'_'+i,d=slotData[k];
    const wrap=document.createElement('div');wrap.className='slot-wrap'+(d&&d.img?' has-img':'');wrap.id='wrap-'+k;
    const imgHTML = d&&d.img ? `<img src="${d.img}" style="display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">` : `<div style="text-align:center;pointer-events:none"><div style="font-size:22px;color:#ccc">📷</div><div style="font-size:10px;color:#ccc;margin-top:2px">タップ</div></div>`;
    wrap.innerHTML = `<div class="slot">${imgHTML}<input type="file" class="slot-file" id="fi-${k}" accept="image/*" onchange="loadSlot(this,'${key}',${i})"></div><input class="nm-input" id="nm-${k}" placeholder="商品名（任意）" value="${d&&d.name?d.name:''}" oninput="slotName('${key}',${i},this.value)"><button class="del-btn" onclick="delSlot('${key}',${i})">×</button>`;
    grid.appendChild(wrap);
  }
  if(show<6){const a=document.createElement('div');a.className='add-slot-btn';a.innerHTML='＋';a.onclick=()=>addSlot(key);grid.appendChild(a);}
}
function loadSlot(input,key,idx){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{const k=key+'_'+idx,nm=document.getElementById('nm-'+k)?document.getElementById('nm-'+k).value:'';slotData[k]={img:e.target.result,name:nm};renderSlots(key,idx+2);};
  r.readAsDataURL(input.files[0]);
}
function slotName(key,idx,val){const k=key+'_'+idx;if(!slotData[k])slotData[k]={img:null,name:''};slotData[k].name=val;}
function delSlot(key,idx){
  delete slotData[key+'_'+idx];
  let i=idx;while(slotData[key+'_'+(i+1)]!==undefined){slotData[key+'_'+i]=slotData[key+'_'+(i+1)];i++;}
  delete slotData[key+'_'+i];renderSlots(key,1);
}
function addSlot(key){let c=0;for(let i=0;i<6;i++)if(slotData[key+'_'+i])c=i+1;renderSlots(key,c+2);}

// ====== テーマ・フォント ======
function setT(t,btn){cur=t;document.querySelectorAll('#theme-top .tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyUI();}
function setT2(t,btn){cur=t;document.querySelectorAll('#theme-gen .tbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyUI();buildAllCards();}
function setFont(f,btn){curFont=f;document.querySelectorAll('#font-row .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setFont2(f,btn){curFont=f;document.querySelectorAll('#font-gen .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildAllCards();}
function applyUI(){
  const c=C(),grad=`linear-gradient(135deg,${c.ac},${c.ac2})`;
  ['abtn1','abtn2','abtn3'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.background=grad;});
  ['sp1','sp2','sp3','sp4'].forEach(id=>{const s=document.getElementById(id);if(s&&s.classList.contains('on'))s.style.background=c.ac;});
  ['pt0','pt1','pt2'].forEach(id=>{const p=document.getElementById(id);if(p&&p.classList.contains('on')){p.style.background=grad;p.style.color='#fff';}});
}
function goP(n){
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i+1===n));
  ['sp1','sp2','sp3','sp4'].forEach((id,i)=>{const s=document.getElementById(id);if(!s)return;const on=i<n;s.classList.toggle('on',on);s.style.background=on?C().ac:'#e0ddf0';});
  if(n===4){syncGen();setTimeout(buildAllCards,80);}
  window.scrollTo(0,0);
}
function syncGen(){

  document.querySelectorAll('#font-gen .fbtn').forEach(b=>{b.classList.remove('active');if(b.id==='fg-'+curFont)b.classList.add('active');});
}
function toggleOther(s,i){document.getElementById(i).style.display=document.getElementById(s).value==='その他'?'block':'none';}
function loadAv(input){if(!input.files[0])return;const r=new FileReader();r.onload=e=>{avDataUrl=e.target.result;const img=document.getElementById('avimg');img.src=avDataUrl;img.style.display='block';document.querySelector('.avcircle span').style.display='none';};r.readAsDataURL(input.files[0]);}
function getV(id){const el=document.getElementById(id);if(!el)return'';if(el.tagName==='SELECT'){const v=el.value;if(v==='その他'){const o=document.getElementById(id+'-o');return o?o.value||'その他':'その他';}return v||'—';}return el.value||'';}

// ====== Canvas共通 ======
function loadImg(src){return new Promise(r=>{
  if(!src){r(null);return;}
  const i=new Image();
  i.onload=()=>r(i);
  i.onerror=()=>r(null);
  // Base64はcrossOrigin不要、URLの場合のみ設定
  if(src.startsWith('http')){i.crossOrigin='anonymous';}
  i.src=src;
});}
function cover(ctx,img,dx,dy,dw,dh){
  const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height,dr=dw/dh,ir=iw/ih;
  let sx,sy,sw,sh;
  if(ir>dr){sh=ih;sw=ih*dr;sx=(iw-sw)/2;sy=0;}else{sw=iw;sh=iw/dr;sx=0;sy=(ih-sh)/2;}
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);
}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function bgGrad(ctx,W,H,c){
  // グラデーション
  const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,c.g1);g.addColorStop(.5,c.g2);g.addColorStop(1,c.g3);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // ドット
  ctx.save();ctx.globalAlpha=0.13;
  for(let x=35;x<W;x+=46){for(let y=35;y<H;y+=46){ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=c.dc[(Math.floor(x/46)+Math.floor(y/46))%c.dc.length];ctx.fill();}}
  ctx.restore();
}

function decos(ctx,W,H,c){
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  const list=cur==='pop'?['⭐','🌟','💫','✨','⭐','🌟','💫','✨']:cur==='sim'?['✦','◇','✦','◇','✦','◇','✦','◇']:['♡','🌸','✦','♡','💕','🌸','♡','✦'];
  const pos=[[W*.06,H*.04],[W*.93,H*.04],[W*.03,H*.22],[W*.95,H*.2],[W*.05,H*.76],[W*.94,H*.78],[W*.89,H*.5],[W*.07,H*.54]];
  pos.forEach(([x,y],i)=>{ctx.globalAlpha=0.3;ctx.font=`${18+i%3*4}px sans-serif`;ctx.fillText(list[i%list.length],x,y);});
  ctx.restore();
}

function cardBox(ctx,x,y,w,h,c,r2){
  r2=r2||16;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=10;ctx.shadowOffsetY=2;
  rr(ctx,x,y,w,h,r2);ctx.fillStyle=c.card;ctx.fill();
  ctx.restore();
  ctx.save();ctx.strokeStyle=c.cb;ctx.lineWidth=1;rr(ctx,x,y,w,h,r2);ctx.stroke();ctx.restore();
}

function header(ctx,W,title,sub,c){
  ctx.save();
  const g=ctx.createLinearGradient(0,0,W,110);g.addColorStop(0,c.g1+'dd');g.addColorStop(1,c.g2+'dd');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=c.hc;ctx.font=`500 18px ${FF()}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('#コスメオタクプロフ',W/2,26);
  ctx.font=`italic 700 34px 'Shippori Mincho',serif`;ctx.fillText(title,W/2,68);
  if(sub){ctx.font=`400 15px ${FF()}`;ctx.fillText(sub,W/2,96);}
  const acc=getV('paccount');
  if(acc){ctx.fillStyle=c.lc;ctx.font=`400 13px ${FF()}`;ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('@'+acc,W-18,6);}
  ctx.restore();
}

function footer(ctx,W,H,c){
  ctx.save();ctx.fillStyle=c.ft;ctx.fillRect(0,H-54,W,54);
  ctx.fillStyle=c.fc;ctx.font=`500 13px ${FF()}`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('♡ 無料肌診断 → j-waga.github.io/glow-skin ♡',W/2,H-27);
  ctx.restore();
}

function lbl(ctx,t,x,y,c){ctx.save();ctx.fillStyle=c.lc;ctx.font=`400 13px ${FF()}`;ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText(t,x,y);ctx.restore();}
function val(ctx,t,x,y,sz,c){ctx.save();ctx.fillStyle=c.vc;ctx.font=`700 ${sz||20}px ${FF()}`;ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText((t||'—').slice(0,15),x,y);ctx.restore();}

// ====== Page1: プロフィール ======
async function buildP1(cv,c){
  const W=750,H=1500;cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  bgGrad(ctx,W,H,c);decos(ctx,W,H,c);header(ctx,W,'Cosme Profile✦',null,c);

  // アバター（clipを使うがsave/restoreで完全に閉じる）
  const avImg=await loadImg(avDataUrl);
  const avR=62,avX=W/2,avY=190;
  ctx.save();
  ctx.beginPath();ctx.arc(avX,avY,avR,0,Math.PI*2);ctx.clip();
  if(avImg){cover(ctx,avImg,avX-avR,avY-avR,avR*2,avR*2);}
  else{
    const gg=ctx.createLinearGradient(avX-avR,avY-avR,avX+avR,avY+avR);
    gg.addColorStop(0,c.g1);gg.addColorStop(1,c.g2);ctx.fillStyle=gg;ctx.fillRect(avX-avR,avY-avR,avR*2,avR*2);
    ctx.fillStyle=c.hc;ctx.font=`700 44px ${FF()}`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText((getV('pname')||'G').charAt(0).toUpperCase(),avX,avY);
  }
  ctx.restore(); // clip解除

  // アバター枠線
  ctx.save();
  const gk=ctx.createLinearGradient(avX-avR,avY-avR,avX+avR,avY+avR);
  gk.addColorStop(0,c.ac);gk.addColorStop(1,c.ac2);
  ctx.strokeStyle=gk;ctx.lineWidth=3.5;ctx.beginPath();ctx.arc(avX,avY,avR,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  const P=24;
  // 名前カード
  cardBox(ctx,P,268,W-P*2,86,c);
  lbl(ctx,'name  名前',P+14,288,c);val(ctx,getV('pname'),P+14,328,22,c);
  const acc=getV('paccount');
  if(acc){ctx.save();ctx.fillStyle=c.lc;ctx.font=`400 14px ${FF()}`;ctx.textAlign='right';ctx.textBaseline='alphabetic';ctx.fillText('@'+acc,W-P-14,328);ctx.restore();}

  // 3列: 年齢・肌質・顔タイプ
  const t3=(W-P*2-16)/3;
  [['age 年齢',getV('page')],['skin 肌質',getV('pskin')],['face 顔タイプ',getV('pface')]].forEach(([lb,vl],i)=>{
    const bx=P+i*(t3+8),by=368;cardBox(ctx,bx,by,t3,78,c);
    lbl(ctx,lb,bx+10,by+18,c);val(ctx,vl,bx+10,by+56,14,c);
  });

  // 3列: PC・骨格・MBTI
  [['PC パーソナルカラー',getV('ppc')],['骨格タイプ',getV('pbone')],['MBTI',getV('pmbti')]].forEach(([lb,vl],i)=>{
    const bx=P+i*(t3+8),by=460;cardBox(ctx,bx,by,t3,78,c);
    lbl(ctx,lb,bx+10,by+18,c);val(ctx,vl,bx+10,by+56,14,c);
  });

  // 2列: ブランド・色
  const hw=(W-P*2-12)/2;
  [['favorite brand 好きなブランド',getV('pbrands')],['favorite color 好きな色',getV('pcolor')]].forEach(([lb,vl],i)=>{
    const bx=P+i*(hw+12),by=552;cardBox(ctx,bx,by,hw,70,c);
    lbl(ctx,lb,bx+10,by+16,c);
    ctx.save();ctx.fillStyle=c.vc;ctx.font=`600 13px ${FF()}`;ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText((vl||'—').slice(0,18),bx+10,by+50);ctx.restore();
  });

  // 自己紹介
  cardBox(ctx,P,636,W-P*2,136,c);
  lbl(ctx,'comment 自己紹介 ♡',P+14,656,c);
  const intro=getV('pintro')||'';
  ctx.save();ctx.fillStyle=c.vc;ctx.font=`400 17px ${FF()}`;ctx.textAlign='left';
  const mw=W-P*2-28;let line='',ly=684;
  for(const ch of intro){const t=line+ch;if(ctx.measureText(t).width>mw){ctx.fillText(line,P+14,ly);line=ch;ly+=26;if(ly>756)break;}else line=t;}
  if(line&&ly<=760)ctx.fillText(line,P+14,ly);
  ctx.restore();

  footer(ctx,W,H,c);
}

// ====== Page2/3: コスメ ======
async function buildCosme(cv,catDefs,titleEn,titleJa,c){
  const W=750,P=24,COLS=3,IH=210;
  const IW=Math.floor((W-P*2-(COLS-1)*10)/COLS);
  let totalH=128;
  const catData=catDefs.map(cat=>{
    const items=[];for(let i=0;i<6;i++){const d=slotData[cat.key+'_'+i];if(d)items.push(d);}
    if(items.length>0)totalH+=50+Math.ceil(items.length/COLS)*(IH+10)+18;
    return{...cat,items};
  });
  const H=Math.max(totalH+70,960);
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  bgGrad(ctx,W,H,c);decos(ctx,W,H,c);header(ctx,W,titleEn,titleJa,c);

  // 全画像をプリロード
  const cache={};
  for(const cat of catData)for(const item of cat.items)if(item.img&&!cache[item.img])cache[item.img]=await loadImg(item.img);

  let curY=126;
  for(const cat of catData){
    if(cat.items.length===0)continue;
    // セクション見出し
    ctx.save();
    ctx.fillStyle=c.hc;ctx.font=`italic 700 22px 'Shippori Mincho',serif`;ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(cat.en,P,curY+22);
    const enW=ctx.measureText(cat.en).width;
    ctx.fillStyle=c.lc;ctx.font=`400 14px ${FF()}`;ctx.fillText('  '+cat.ja,P+enW,curY+22);
    ctx.strokeStyle=c.cb;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(P,curY+30);ctx.lineTo(W-P,curY+30);ctx.stroke();
    ctx.restore();
    curY+=46;

    // 枚数に応じて列数を動的に変更
    const dynCols = cat.items.length===1 ? 1 : cat.items.length===2 ? 2 : COLS;
    const dynIW = Math.floor((W-P*2-(dynCols-1)*10)/dynCols);
    const rows=Math.ceil(cat.items.length/dynCols);
    for(let r=0;r<rows;r++){
      for(let col=0;col<dynCols;col++){
        const idx=r*dynCols+col;if(idx>=cat.items.length)break;
        const item=cat.items[idx];
        const sx=P+col*(dynIW+10),sy=curY;
        cardBox(ctx,sx,sy,dynIW,IH,c,14);
        const iimg=item.img?cache[item.img]:null;
        if(iimg){
          ctx.save();rr(ctx,sx+4,sy+4,dynIW-8,IH-34,10);ctx.clip();cover(ctx,iimg,sx+4,sy+4,dynIW-8,IH-34);ctx.restore();
        } else {
          ctx.save();rr(ctx,sx+4,sy+4,dynIW-8,IH-34,10);
          const pg=ctx.createLinearGradient(sx,sy,sx+dynIW,sy+IH);pg.addColorStop(0,c.g1+'99');pg.addColorStop(1,c.g2+'99');
          ctx.fillStyle=pg;ctx.fill();
          ctx.fillStyle=c.ac+'88';ctx.font='28px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('📷',sx+dynIW/2,sy+(IH-34)/2+4);
          ctx.restore();
        }
        ctx.save();ctx.fillStyle=c.vc;ctx.font=`500 11px ${FF()}`;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText((item.name||'').slice(0,14),sx+dynIW/2,sy+IH-7);ctx.restore();
      }
      curY+=IH+10;
    }
    curY+=18;
  }
  footer(ctx,W,H,c);
}
